name: Auto Assign

on:
  pull_request_target:
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: read
  pull-requests: write

jobs:
  add-assignee:
    name: Auto assign (me only)
    runs-on: ubuntu-latest
    steps:
      - uses: kentaro-m/auto-assign-action@v2.0.2
        with:
          configuration-path: ".github/auto_assign.yml"
